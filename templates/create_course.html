<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание курса | StudyTask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}"><i class="bi bi-journal-bookmark-fill me-2"></i>StudyTask</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-house me-1"></i>Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('courses') }}"><i class="bi bi-book me-1"></i>Курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('statistics') }}"><i class="bi bi-graph-up me-1"></i>Статистика</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}"><i class="bi bi-person me-1"></i>Профиль</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-1"></i>Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <h2 class="fw-bold mb-0"><i class="bi bi-journal-plus text-primary me-2"></i>Создание курса</h2>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Название курса</label>
                                <input type="text" name="title" class="form-control" placeholder="Например: Python-разработка" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Описание курса</label>
                                <textarea name="description" class="form-control" rows="5" placeholder="Опишите содержание курса..."></textarea>
                            </div>
                            <div class="d-flex gap-3 justify-content-end">
                                <a href="{{ url_for('courses') }}" class="btn btn-outline-secondary">Отмена</a>
                                <button type="submit" class="btn btn-primary">Создать курс</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
