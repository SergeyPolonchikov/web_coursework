<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование задания | StudyTask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
                <i class="bi bi-journal-bookmark-fill me-2"></i>StudyTask
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-house me-1"></i>Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('courses') }}"><i class="bi bi-book me-1"></i>Курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('statistics') }}"><i class="bi bi-graph-up me-1"></i>Статистика</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}"><i class="bi bi-person me-1"></i>Профиль</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-1"></i>Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square text-primary me-2"></i>Редактирование задания</h2>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Название задания</label>
                                    <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Учебный курс</label>
                                    <select name="course_id" class="form-select" required>
                                        {% for course in courses %}
                                            <option value="{{ course.id }}" {% if course.id == task.course_id %}selected{% endif %}>{{ course.title }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Тип задания</label>
                                    <select name="task_type" class="form-select">
                                        <option {% if task.task_type == 'Лабораторная работа' %}selected{% endif %}>Лабораторная работа</option>
                                        <option {% if task.task_type == 'Практическая работа' %}selected{% endif %}>Практическая работа</option>
                                        <option {% if task.task_type == 'Проект' %}selected{% endif %}>Проект</option>
                                        <option {% if task.task_type == 'Тестирование' %}selected{% endif %}>Тестирование</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Максимальный балл</label>
                                    <input type="number" name="max_score" class="form-control" value="{{ task.max_score }}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Описание задания</label>
                                <textarea name="description" class="form-control" rows="6" required>{{ task.description }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Срок сдачи</label>
                                <input type="datetime-local" name="deadline" class="form-control" value="{{ task.deadline.strftime('%Y-%m-%dT%H:%M') }}" required>
                            </div>
                            <div class="card bg-light border-0 rounded-3 p-3 mb-4">
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" name="allow_resubmit" {% if task.allow_resubmit %}checked{% endif %} id="allowResubmit">
                                    <label class="form-check-label" for="allowResubmit">Разрешить повторную отправку работы</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="is_published" {% if task.is_published %}checked{% endif %} id="isPublished">
                                    <label class="form-check-label" for="isPublished">Отображать задание студентам</label>
                                </div>
                            </div>
                            <div class="d-flex gap-3 justify-content-end">
                                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Отмена</a>
                                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
