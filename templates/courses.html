<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Курсы | StudyTask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">StudyTask</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{{ url_for('courses') }}">Курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('statistics') }}">Статистика</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}">Профиль</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="{{ url_for('logout') }}">Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container py-4">
        <h1 class="fw-bold mb-4">Мои курсы</h1>
        
        <div class="row">
            {% for course in courses %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ course.title }}</h5>
                        <p class="card-text text-muted">{{ course.description or 'Нет описания' }}</p>
                        <a href="{{ url_for('course_detail', course_id=course.id) }}" class="btn btn-primary">Перейти к курсу</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
