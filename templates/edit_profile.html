<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование профиля | StudyTask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">StudyTask</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('courses') }}">Курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('statistics') }}">Статистика</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}">Профиль</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="{{ url_for('logout') }}">Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h2 class="fw-bold mb-4">Редактирование профиля</h2>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Имя пользователя</label>
                                <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Группа</label>
                                <input type="text" name="group" class="form-control" value="{{ current_user.group or '' }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">О себе</label>
                                <textarea name="about" class="form-control" rows="4">{{ current_user.about or '' }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Новый пароль</label>
                                <input type="password" name="new_password" class="form-control" placeholder="Оставьте пустым, чтобы не менять">
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Сохранить</button>
                                <a href="{{ url_for('profile') }}" class="btn btn-secondary">Отмена</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
